<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Local Dev Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #18181b;
      color: #f4f4f5;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Barra Lateral Esquerda (Chats e Config) */
    .app-sidebar {
      width: 260px;
      background: #1c1c1f;
      border-right: 1px solid #2e2e33;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 16px;
    }

    .btn-new-chat {
      width: 100%;
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #f4f4f5;
      padding: 10px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s ease;
    }

    .btn-new-chat:hover {
      background: #3f3f46;
    }

    /* Lista de Chats */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s ease;
    }

    .chat-item:hover {
      background: #27272a;
      color: #f4f4f5;
    }

    .chat-item.active {
      background: #27272a;
      color: #ffffff;
      font-weight: 500;
    }

    /* Rodapé da Sidebar */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #2e2e33;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-profile {
      font-size: 0.85rem;
      color: #e4e4e7;
      font-weight: 500;
    }

    /* Área Principal da Direita */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #18181b;
      height: 100%;
    }

    /* Barra Superior Interna */
    header {
      height: 56px;
      background: #202024;
      border-bottom: 1px solid #2e2e33;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Botões de Ícone Gerais */
    .btn-icon {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .btn-icon:hover {
      background: #27272a;
      color: #f4f4f5;
      border-color: #52525b;
    }

    /* Conteiner de Mensagens */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #chat-box::-webkit-scrollbar, .modal-body::-webkit-scrollbar {
      width: 6px;
    }

    #chat-box::-webkit-scrollbar-track, .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-box::-webkit-scrollbar-thumb, .modal-body::-webkit-scrollbar-thumb {
      background: #2e2e33;
      border-radius: 3px;
    }

    /* Mensagens */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .user {
      background: #004b7c;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .agent {
      background: #202024;
      color: #e4e4e7;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      border: 1px solid #2e2e33;
    }

    /* Campo de Entrada */
    .input-area {
      padding: 24px 32px;
      background: #18181b;
      border-top: 1px solid #2e2e33;
      display: flex;
      gap: 12px;
    }

    .input-area input {
      flex: 1;
      background: #202024;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #f4f4f5;
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
    }

    #btn-send {
      background: #007acc;
      border: none;
      color: #ffffff;
      padding: 0 18px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Estrutura do Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(9, 9, 11, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #202024;
      border: 1px solid #2e2e33;
      border-radius: 12px;
      width: 640px;
      max-width: 95%;
      height: 440px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e2e33;
      padding: 16px 24px;
    }

    .modal-container-tabs {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .modal-nav-sidebar {
      width: 160px;
      background: #1c1c1f;
      border-right: 1px solid #2e2e33;
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-tab-btn {
      background: transparent;
      border: none;
      color: #a1a1aa;
      padding: 10px 12px;
      border-radius: 6px;
      text-align: left;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .nav-tab-btn.active {
      background: #27272a;
      color: #ffffff;
      font-weight: 600;
    }

    .modal-body {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .tab-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .tab-panel.active {
      display: flex;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-group label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a1a1aa;
    }

    .config-group input[type="text"] {
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      background: #27272a;
      color: #f4f4f5;
      font-size: 0.85rem;
      outline: none;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .info-card {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 12px;
    }

    .info-card .info-label {
      font-size: 0.7rem;
      color: #a1a1aa;
      margin-bottom: 4px;
    }

    .info-card .info-value {
      font-size: 0.9rem;
      font-family: monospace;
    }

    .range-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .range-container input[type="range"] {
      flex: 1;
      accent-color: #007acc;
    }

    .credit-box {
      background: #18181b;
      border: 1px solid #2e2e33;
      border-radius: 8px;
      padding: 14px;
    }

    .credit-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #27272a;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #007acc, #00b4d8);
    }

    .chart-container {
      background: #18181b;
      border: 1px solid #2e2e33;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 100px;
      border-bottom: 1px solid #2e2e33;
    }

    .chart-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .chart-bar {
      width: 24px;
      background: #3f3f46;
      border-top-left-radius: 3px;
      border-top-right-radius: 3px;
    }

    .chart-label {
      font-size: 0.65rem;
      color: #71717a;
      font-family: monospace;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      padding: 12px 24px;
      border-top: 1px solid #2e2e33;
      background: #1c1c1f;
    }

    .btn-primary {
      background: #007acc;
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="app-sidebar">
      <div class="sidebar-header">
        <button class="btn-new-chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Chat
        </button>
      </div>

      <div class="chat-list" id="chat-list-container">
        </div>

      <div class="sidebar-footer">
        <span class="user-profile">Developer</span>
        <button id="btn-open-settings" class="btn-icon" title="Configurações">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <div class="main-content">
      <header>
        <h2 id="active-chat-title">Chat Inicial</h2>
        <div class="header-actions">
          <span id="selected-path" style="font-size: 0.8rem; color: #a1a1aa; font-family: monospace;">Nenhuma pasta selecionada</span>
          <button id="btn-select-folder" class="btn-icon" title="Selecionar Pasta para este Chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
      </header>

      <div id="chat-box"></div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Peça para criar um arquivo, ler algo ou rodar um comando..." disabled>
        <button id="btn-send" disabled title="Enviar Mensagem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>

  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Configurações</h3>
        <button id="btn-close-modal" class="btn-icon" style="border:none; padding:4px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <div class="modal-container-tabs">
        <div class="modal-nav-sidebar">
          <button class="nav-tab-btn active" data-tab="tab-geral">Geral</button>
          <button class="nav-tab-btn" data-tab="tab-uso">Uso</button>
          <button class="nav-tab-btn" data-tab="tab-personalizacao">Personalização</button>
        </div>

        <div class="modal-body">
          <div id="tab-geral" class="tab-panel active">
            <div class="config-group">
              <label>Informações Ativas do Modelo</label>
              <div class="info-grid">
                <div class="info-card"><div class="info-label">Nome do Modelo</div><div class="info-value">llama3:8b</div></div>
                <div class="info-card"><div class="info-label">Quantização</div><div class="info-value">Q8_0</div></div>
                <div class="info-card"><div class="info-label">Comprimento Contexto</div><div class="info-value">8,192 tkn</div></div>
                <div class="info-card"><div class="info-label">Tamanho</div><div class="info-value">4.85 GB</div></div>
              </div>
            </div>
          </div>

          <div id="tab-uso" class="tab-panel">
            <div class="config-group">
              <label>Status de Créditos</label>
              <div class="credit-box">
                <div class="credit-header"><span>Porcentagem de Uso</span><span>42%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 42%;"></div></div>
              </div>
            </div>
            <div class="chart-container">
              <div class="bar-chart">
                <div class="chart-column"><div class="chart-bar" style="height: 30%;"></div><span class="chart-label">Seg</span></div>
                <div class="chart-column"><div class="chart-bar" style="height: 55%;"></div><span class="chart-label">Ter</span></div>
                <div class="chart-column"><div class="chart-bar" style="height: 42%;"></div><span class="chart-label">Qua</span></div>
                <div class="chart-column"><div class="chart-bar" style="height: 80%;"></div><span class="chart-label">Qui</span></div>
                <div class="chart-column"><div class="chart-bar" style="height: 65%;"></div><span class="chart-label">Sex</span></div>
              </div>
            </div>
          </div>

          <div id="tab-personalizacao" class="tab-panel">
            <div class="config-group">
              <label for="api-url">Endpoint da API</label>
              <input type="text" id="api-url" value="http://localhost:11434/v1">
            </div>
            <div class="config-group">
              <label for="range-temp">Temperatura</label>
              <div class="range-container">
                <input type="range" id="range-temp" min="0" max="2" step="0.1" value="0.7" oninput="this.nextElementSibling.innerText = this.value">
                <span class="range-value">0.7</span>
              </div>
            </div>
            <div class="config-group">
              <label for="range-topp">Top P</label>
              <div class="range-container">
                <input type="range" id="range-topp" min="0" max="1" step="0.05" value="0.9" oninput="this.nextElementSibling.innerText = this.value">
                <span class="range-value">0.9</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="btn-save-settings" class="btn-primary">Salvar e Fechar</button>
      </div>
    </div>
  </div>

  <script>
    // Estrutura JSON que faz a atrelação direta de cada Chat à sua respectiva Pasta (Y)
    let chatsData = {
      "chat_1": { name: "Chat Inicial", path: "Nenhuma pasta selecionada" },
      "chat_2": { name: "Refatoração Backend", path: "/workspace/projeto-node" },
      "chat_3": { name: "Ajustes de CSS UI", path: "/workspace/frontend-app" }
    };
    let activeChatId = "chat_1";

    // Renderizar a lista de chats na Barra Lateral
    function renderChatList() {
      const container = document.getElementById('chat-list-container');
      container.innerHTML = '';
      
      Object.keys(chatsData).forEach(id => {
        const item = document.createElement('div');
        item.className = `chat-item ${id === activeChatId ? 'active' : ''}`;
        item.innerText = chatsData[id].name;
        item.setAttribute('data-id', id);
        
        item.addEventListener('click', () => {
          activeChatId = id;
          updateActiveChatView();
          renderChatList();
        });
        
        container.appendChild(item);
      });
    }

    // Atualiza a View de acordo com o Chat ativo obtido do JSON
    function updateActiveChatView() {
      const currentChat = chatsData[activeChatId];
      document.getElementById('active-chat-title').innerText = currentChat.name;
      document.getElementById('selected-path').innerText = currentChat.path;
      
      // Aqui você limparia/carregaria o histórico de mensagens real daquele chat vindo do Electron
      document.getElementById('chat-box').innerHTML = ''; 
    }

    // Listener Simulado para o botão de selecionar pasta do Electron
    document.getElementById('btn-select-folder').addEventListener('click', () => {
      // No Electron real você chamará o diálogo nativo e obterá o path real.
      // Exemplo de atribuição modificando o JSON relacional dinamicamente:
      const fakePathChosen = "/user/desktop/nova-pasta-atrelada-" + activeChatId;
      
      chatsData[activeChatId].path = fakePathChosen;
      document.getElementById('selected-path').innerText = fakePathChosen;
    });

    // Controle de Abas Internas do Modal
    const tabButtons = document.querySelectorAll('.nav-tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        tabButtons.forEach(btn => btn.classList.remove('active'));
        tabPanels.forEach(panel => panel.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(button.getAttribute('data-tab')).classList.add('active');
      });
    });

    // Abrir/Fechar Modal
    const modal = document.getElementById('settings-modal');
    document.getElementById('btn-open-settings').addEventListener('click', () => modal.classList.add('active'));
    const closeModal = () => modal.classList.remove('active');
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('btn-save-settings').addEventListener('click', closeModal);

    // Inicialização da interface
    renderChatList();
    updateActiveChatView();
  </script>

  <script src="renderer.js"></script>
</body>
</html>
